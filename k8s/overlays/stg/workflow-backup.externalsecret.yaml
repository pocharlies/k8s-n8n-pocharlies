apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-workflow-backup
  namespace: n8n-stg
  labels:
    app.kubernetes.io/name: n8n-stg
    app.kubernetes.io/part-of: workflow-automation
    app.kubernetes.io/component: workflow-backup-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: n8n-workflow-backup
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      data:
        N8N_BACKUP_WEBHOOK_URL: "{{ .webhook_url }}"
        N8N_BACKUP_WEBHOOK_SECRET: "{{ .webhook_secret }}"
        GITHUB_TOKEN: "{{ .github_token }}"
        GITHUB_OWNER: "{{ .github_owner }}"
        GITHUB_REPO: "{{ .github_repo }}"
        GITHUB_BRANCH: "{{ .github_branch }}"
        GITHUB_WORKFLOW_BACKUP_PATH: "{{ .github_workflow_backup_path }}"
        N8N_BACKUP_EXCLUDE_WORKFLOW_IDS: "{{ .exclude_workflow_ids }}"
        N8N_BACKUP_SOURCE_INSTANCE: "{{ .source_instance }}"
        N8N_BACKUP_HOOK_TIMEOUT_MS: "{{ .hook_timeout_ms }}"
  data:
    - secretKey: webhook_url
      remoteRef: { key: n8n/stg/workflow-backup, property: webhook_url }
    - secretKey: webhook_secret
      remoteRef: { key: n8n/stg/workflow-backup, property: webhook_secret }
    - secretKey: github_token
      remoteRef: { key: n8n/stg/workflow-backup, property: github_token }
    - secretKey: github_owner
      remoteRef: { key: n8n/stg/workflow-backup, property: github_owner }
    - secretKey: github_repo
      remoteRef: { key: n8n/stg/workflow-backup, property: github_repo }
    - secretKey: github_branch
      remoteRef: { key: n8n/stg/workflow-backup, property: github_branch }
    - secretKey: github_workflow_backup_path
      remoteRef: { key: n8n/stg/workflow-backup, property: github_workflow_backup_path }
    - secretKey: exclude_workflow_ids
      remoteRef: { key: n8n/stg/workflow-backup, property: exclude_workflow_ids }
    - secretKey: source_instance
      remoteRef: { key: n8n/stg/workflow-backup, property: source_instance }
    - secretKey: hook_timeout_ms
      remoteRef: { key: n8n/stg/workflow-backup, property: hook_timeout_ms }
